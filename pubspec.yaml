name: sendate
description: "Privacy-first, offline-first, cross-platform file transfer."
publish_to: 'none'
version: 1.0.4+2

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Networking
  network_info_plus: ^6.1.1
  connectivity_plus: ^6.1.4

  # Security
  cryptography: ^2.7.0
  crypto: ^3.0.6

  # File Operations
  file_picker: ^8.3.7
  open_filex: ^4.6.0
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  mime: ^2.0.0
  share_handler: 0.0.16

  # QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.0.2

  # Notifications
  flutter_local_notifications: ^18.0.1

  # UI
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.2
  gap: ^3.0.1
  lucide_icons:
    path: packages/lucide_icons
  local_auth: ^2.3.0
  google_fonts: ^6.2.1

  # Conversion
  flutter_image_compress: ^2.3.0
  # Background (desktop only - tray)
  tray_manager: ^0.2.3
  window_manager: ^0.4.3

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.2
  permission_handler: ^11.4.0
  device_info_plus: ^11.3.3
  package_info_plus: ^8.3.0
  wakelock_plus: ^1.3.3
  nsd: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/docs/

dependency_overrides:
  share_handler_ios: 0.0.14

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  macos:
    generate: true
  image_path: "src/img/app_logo.png"

flutter_native_splash:
  color: "#1A1A1A"
  color_dark: "#1A1A1A"
  image: "src/img/app_logo.png"
  android: true
  ios: true
  android_12:
    image: "src/img/app_logo.png"
    icon_background_color: "#1A1A1A"


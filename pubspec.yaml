name: sendate
description: "Privacy-first, offline-first, cross-platform file transfer."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Networking
  network_info_plus: ^6.1.1
  connectivity_plus: ^6.1.4

  # Security
  cryptography: ^2.7.0
  crypto: ^3.0.6

  # File Operations
  file_picker: ^8.3.7
  open_filex: ^4.6.0
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  mime: ^2.0.0

  # QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.0.2

  # Notifications
  flutter_local_notifications: ^18.0.1

  # UI
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.2
  gap: ^3.0.1
  lucide_icons:
    path: packages/lucide_icons
  local_auth: ^2.3.0

  # Conversion
  flutter_image_compress: ^2.3.0
  # Background (desktop only - tray)
  tray_manager: ^0.2.3
  window_manager: ^0.4.3

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.2
  permission_handler: ^11.4.0
  device_info_plus: ^11.3.3
  package_info_plus: ^8.3.0
  wakelock_plus: ^1.2.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
